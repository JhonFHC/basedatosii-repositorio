<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UPLA - Portal de Acceso</title>
  <link rel="stylesheet" href="css/instyle.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <!-- Para íconos -->
  <script defer src="js/inscript.js"></script>
  <script defer src="js/particles.js"></script> <!-- Partículas de fondo -->
</head>
<body>
  <!-- Fondo de partículas -->
  <canvas id="particles"></canvas>

  <div class="hero-section">
    <!-- Header principal -->
    <header class="header-title">
      <h1>Universidad Peruana Los Andes</h1>
      <p class="subtitle">Portal de Acceso</p>
      <p class="description">Bienvenido a la UPLA. Accede a los recursos educativos, tareas y más.</p>
    </header>

    <!-- Bloque central de entrada -->
    <div class="text-block" id="portal" data-target="inicio.html">
      <i class="fas fa-door-open"></i> <!-- Ícono de portal/puerta -->
      <h2>Entrar a la Interfaz</h2>
      <p>Haz clic aquí para comenzar tu experiencia</p>
    </div>
  </div>
</body>
</html>
